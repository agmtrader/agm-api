name: Daily Screenings

on:
  schedule:
    - cron: '0 14 * * *'   # Every day at 2 PM UTC (9:00 AM CST)
  workflow_dispatch:

jobs:
  run-screenings:
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.screenings.outputs.summary }}
    steps:
      - name: Request token and run screenings
        id: screenings
        shell: bash
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"token":"all"}' \
            https://api.agmtechnology.com/token)

          http_status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_status" != "200" ]; then
            echo "Token request failed with status $http_status" >&2
            exit 1
          fi

          access_token=$(echo "$body" | jq -r '.access_token')
          if [ "$access_token" = "null" ] || [ -z "$access_token" ]; then
            echo "access_token not found in response" >&2
            exit 1
          fi

          response=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer $access_token" \
            https://api.agmtechnology.com/actions/run_screening_process)

          http_status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_status" != "200" ]; then
            echo "Screenings run failed with status $http_status" >&2
            echo "$body"
            exit 1
          fi

          screenings_skipped=$(echo "$body" | jq -r '.screenings_skipped // false')
          skip_reason=$(echo "$body" | jq -r '.skip_reason // ""')
          total_screenings_planned=$(echo "$body" | jq -r '.total_screenings_planned // 0')
          screenings_executed=$(echo "$body" | jq -r '.screenings_executed // 0')
          screening_errors=$(echo "$body" | jq -r '.screening_errors_count // (.screening_errors | length) // 0')
          sanctions_available=$(echo "$body" | jq -r '.sanctions_comparison.available // false')
          sanctions_all_same=$(echo "$body" | jq -r '.sanctions_comparison.all_same // false')
          ofac_added=$(echo "$body" | jq -r '.sanctions_comparison.lists.ofac.added_count // 0')
          ofac_removed=$(echo "$body" | jq -r '.sanctions_comparison.lists.ofac.removed_count // 0')
          uk_added=$(echo "$body" | jq -r '.sanctions_comparison.lists.uk.added_count // 0')
          uk_removed=$(echo "$body" | jq -r '.sanctions_comparison.lists.uk.removed_count // 0')
          un_added=$(echo "$body" | jq -r '.sanctions_comparison.lists.un.added_count // 0')
          un_removed=$(echo "$body" | jq -r '.sanctions_comparison.lists.un.removed_count // 0')

          summary=$(cat <<EOF
          Screenings skipped: $screenings_skipped
          Skip reason: ${skip_reason:-N/A}
          Sanctions available: $sanctions_available
          Sanctions all same: $sanctions_all_same
          OFAC delta: +$ofac_added / -$ofac_removed
          UK delta: +$uk_added / -$uk_removed
          UN delta: +$un_added / -$un_removed
          Total screenings planned: $total_screenings_planned
          Screenings executed: $screenings_executed
          Screening errors: $screening_errors
          EOF
          )

          printf "summary<<EOF\n%s\nEOF\n" "$summary" >> "$GITHUB_OUTPUT"
          echo "$summary"

  notify-success:
    needs: run-screenings
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - name: Send success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Daily Screenings SUCCEEDED"
          to: cr@agmtechnology.com,aa@agmtechnology.com
          from: aa@agmtechnology.com
          body: |
            The daily screenings workflow completed successfully.

            ${{ needs.run-screenings.outputs.summary }}

  notify-failure:
    needs: run-screenings
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚨 Daily Screenings FAILED"
          to: cr@agmtechnology.com,aa@agmtechnology.com
          from: aa@agmtechnology.com
          body: |
            The daily screenings workflow failed. Review workflow logs for details.
