<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #2D3748;
            margin: 0;
            padding: 0;
            background-color: #F7FAFC;
        }
        .container {
            max-width: 640px;
            margin: 32px auto;
            padding: 32px;
            background-color: #FFFFFF;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        h1 {
            color: #1A365D;
            font-size: 22px;
            margin-top: 0;
        }
        .meta {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 16px 0;
        }
        a {
            color: #1A365D;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Compliance Manual Updated</h1>
        <p>There were updates to the compliance manual.</p>
        <p>Please review the latest version and acknowledge the changes.</p>
    </div>
</body>
</html>
